#
# Parameterized heat-sink config.
# inlet_vel is treated as a network input (range 1.0~2.5 m/s).
# Recommended full run: 300,000 steps.

defaults :
  - physicsnemo_default
  - arch:
      - fully_connected
  - optimizer : adam
  - scheduler : tf_exponential_lr
  - loss : sum
  - _self_

jit: false

scheduler:
  decay_rate: 0.95
  decay_steps: 5000

training:
  rec_validation_freq: 1000
  rec_inference_freq: 1000
  rec_monitor_freq: 1000
  rec_constraint_freq: 2000
  max_steps: 600000

batch_size:
  inlet: 128
  outlet: 128
  hs_wall: 1000
  channel_wall: 5000
  interior_flow: 9600
  interior_heat: 9600
  integral_continuity: 256
  num_integral_continuity: 8

custom:
  parameterized: true
